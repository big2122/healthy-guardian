<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>헬스 가디언 - 내 손안의 주치의</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet JS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 어르신을 위한 폰트 설정 및 부드러운 UI 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent; /* 터치 시 파란색 하이라이트 제거 */
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        /* 하단 네비게이션 바 스타일 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background-color: #ffffff;
            border-top: 1px solid #e5e7eb;
            padding: 0.75rem 0;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); /* 아이폰 하단 여백 대응 */
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9ca3af;
            font-size: 0.75rem;
            gap: 0.3rem;
            transition: color 0.2s;
        }
        .nav-item.active {
            color: #2563eb;
            font-weight: bold;
        }
        .nav-item i {
            font-size: 1.25rem;
        }

        /* 음성 인식 마이크 버튼 애니메이션 */
        .mic-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .recording {
            animation: pulse-red 1.5s infinite;
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 가로 스크롤바 숨기기 (진료과목 필터용) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- 상단 헤더 -->
        <header class="bg-blue-600 text-white p-4 text-center rounded-b-2xl shadow-md z-10">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-shield-heart mr-2"></i>헬스 가디언</h1>
            <p class="text-blue-100 text-sm mt-1" id="current-date"></p>
        </header>

        <!-- 메인 콘텐츠 영역 (각 탭 화면들이 전환됨) -->
        <main class="main-content relative">
            
            <!-- 1. 홈 화면 (오늘의 할 일) -->
            <section id="screen-home" class="h-full flex flex-col">
                <div class="bg-blue-50 rounded-2xl p-5 mb-6 shadow-sm border border-blue-100">
                    <h2 class="text-xl font-bold text-gray-800 mb-2">김어르신님, 반가워요!</h2>
                    <p class="text-gray-600 text-base">오늘도 건강한 하루를 시작해볼까요?</p>
                </div>

                <h3 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-list-check text-blue-600 mr-2"></i>오늘의 건강 미션</h3>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
                    <div class="flex items-center justify-between mb-4 pb-4 border-b border-gray-100">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="w-7 h-7 rounded text-blue-600 cursor-pointer">
                            <span class="text-lg font-medium text-gray-800">아침 식후 고혈압 약 복용</span>
                        </div>
                        <span class="text-blue-600 font-bold text-lg">08:00</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="w-7 h-7 rounded text-blue-600 cursor-pointer">
                            <span class="text-lg font-medium text-gray-800">가볍게 관절 스트레칭</span>
                        </div>
                        <span class="text-orange-500 font-bold text-lg">14:00</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-auto">
                    <button onclick="switchTab('voice')" class="bg-blue-600 text-white p-5 rounded-2xl shadow-md flex flex-col items-center justify-center gap-3 active:bg-blue-700">
                        <i class="fa-solid fa-microphone text-4xl"></i>
                        <span class="font-bold text-lg">증상 말하기</span>
                    </button>
                    <button onclick="switchTab('map')" class="bg-green-600 text-white p-5 rounded-2xl shadow-md flex flex-col items-center justify-center gap-3 active:bg-green-700">
                        <i class="fa-solid fa-hospital text-4xl"></i>
                        <span class="font-bold text-lg">주변 병원찾기</span>
                    </button>
                </div>
            </section>

            <!-- 2. 증상 음성 입력 화면 -->
            <section id="screen-voice" class="hidden h-full flex flex-col items-center justify-center text-center">
                <h2 class="text-3xl font-bold text-gray-800 mb-3">어디가 불편하신가요?</h2>
                <p class="text-gray-500 mb-10 text-lg">아래 버튼을 누르고 편하게 말씀해주세요</p>

                <!-- 마이크 버튼 -->
                <button id="mic-btn" class="mic-btn text-white w-36 h-36 rounded-full shadow-xl flex items-center justify-center mb-8" onclick="toggleRecording()">
                    <i class="fa-solid fa-microphone text-6xl"></i>
                </button>

                <!-- 음성 인식 상태 텍스트 -->
                <p id="voice-status" class="text-blue-600 font-bold text-xl h-10 flex items-center justify-center">마이크 버튼을 눌러주세요</p>
                
                <!-- AI 분석 결과 박스 -->
                <div id="result-box" class="w-full bg-blue-50 rounded-2xl p-5 mt-6 border border-blue-200 hidden text-left shadow-sm">
                    <h3 class="font-bold text-gray-800 text-lg mb-3"><i class="fa-solid fa-user-doctor text-blue-600 mr-2"></i>건강 분석 결과</h3>
                    <p id="result-text" class="text-gray-700 text-lg leading-relaxed mb-5"></p>
                    <button onclick="switchTab('map')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-xl shadow-md active:bg-blue-700">
                        이 증상에 맞는 병원 찾기
                    </button>
                </div>
            </section>

            <!-- 3. 지도 기반 병원 찾기 화면 -->
            <section id="screen-map" class="hidden h-full flex flex-col">
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 mb-1">내 주변 병원 찾기</h2>
                    <p id="location-status" class="text-gray-500 text-sm mb-3">
                        <i class="fa-solid fa-spinner fa-spin text-blue-500 mr-1"></i> 위치를 확인하고 있습니다...
                    </p>
                    
                    <!-- 검색 및 필터 -->
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="hospital-search" placeholder="병원 이름 검색" class="w-full p-3 border-2 border-gray-300 rounded-xl text-lg focus:border-blue-500 focus:outline-none">
                        <button onclick="searchHospital()" class="bg-blue-600 text-white px-5 rounded-xl text-xl font-bold shadow-sm active:bg-blue-700">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>

                    <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar" id="dept-filters">
                        <button onclick="filterDept('전체')" class="dept-btn active-dept flex-shrink-0 bg-blue-600 text-white px-4 py-2 rounded-full text-base font-bold border-2 border-blue-600 transition-colors">전체</button>
                        <button onclick="filterDept('내과')" class="dept-btn flex-shrink-0 bg-white text-gray-600 px-4 py-2 rounded-full text-base font-bold border-2 border-gray-300 transition-colors">내과</button>
                        <button onclick="filterDept('정형외과')" class="dept-btn flex-shrink-0 bg-white text-gray-600 px-4 py-2 rounded-full text-base font-bold border-2 border-gray-300 transition-colors">정형외과</button>
                        <button onclick="filterDept('안과')" class="dept-btn flex-shrink-0 bg-white text-gray-600 px-4 py-2 rounded-full text-base font-bold border-2 border-gray-300 transition-colors">안과</button>
                        <button onclick="filterDept('치과')" class="dept-btn flex-shrink-0 bg-white text-gray-600 px-4 py-2 rounded-full text-base font-bold border-2 border-gray-300 transition-colors">치과</button>
                    </div>
                </div>
                
                <!-- 실제 지도 렌더링 영역 -->
                <div id="hospital-map" class="w-full h-56 bg-gray-200 rounded-xl overflow-hidden mb-4 shadow-inner relative flex-shrink-0 z-0"></div>

                <!-- 병원 리스트 -->
                <div id="hospital-list" class="space-y-3 pb-6 flex-1 overflow-y-auto no-scrollbar">
                    <p class="text-center text-gray-500 py-4">병원을 찾고 있습니다...</p>
                </div>
            </section>

            <!-- 4. 내 정보 화면 (프로필) -->
            <section id="screen-profile" class="hidden h-full flex flex-col">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">내 정보</h2>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-5 flex items-center gap-5">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-4xl">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800">김어르신</h3>
                        <p class="text-gray-500 text-lg mt-1">65세 / 전라남도 목포시</p>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-5">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">기본 건강 정보</h3>
                    <p class="text-gray-700 mb-3 text-lg"><i class="fa-solid fa-droplet text-red-500 w-8"></i> 혈액형: <b>A형</b></p>
                    <p class="text-gray-700 text-lg"><i class="fa-solid fa-notes-medical text-green-500 w-8"></i> 기저질환: <b>고혈압</b></p>
                </div>
                <button class="w-full bg-red-50 text-red-600 border border-red-200 py-4 rounded-xl font-bold text-xl mt-auto mb-4 shadow-sm active:bg-red-100 transition-colors">
                    <i class="fa-solid fa-phone text-2xl mr-2"></i> 보호자에게 전화걸기
                </button>
            </section>

        </main>

        <!-- 하단 네비게이션 탭 -->
        <nav class="bottom-nav z-10 shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)]">
            <button class="nav-item active w-full" data-target="home" onclick="switchTab('home')">
                <i class="fa-solid fa-house"></i>
                <span>홈</span>
            </button>
            <button class="nav-item w-full" data-target="voice" onclick="switchTab('voice')">
                <i class="fa-solid fa-microphone"></i>
                <span>증상입력</span>
            </button>
            <button class="nav-item w-full" data-target="map" onclick="switchTab('map')">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>병원찾기</span>
            </button>
            <button class="nav-item w-full" data-target="profile" onclick="switchTab('profile')">
                <i class="fa-solid fa-user"></i>
                <span>내정보</span>
            </button>
        </nav>
    </div>

    <script>
        // 오늘 날짜 세팅
        const dateElement = document.getElementById('current-date');
        const now = new Date();
        const options = { month: 'long', day: 'numeric', weekday: 'long' };
        dateElement.innerText = now.toLocaleDateString('ko-KR', options);

        // 지도 관련 전역 변수
        let mapInitialized = false;
        let map = null;
        let userMarker = null;
        let hospitalMarkers = [];
        let allHospitals = [];
        let currentDept = '전체';
        let currentSearch = '';

        // 하단 탭 전환 함수
        function switchTab(tabId) {
            // 모든 화면 숨기기
            ['home', 'voice', 'map', 'profile'].forEach(id => {
                document.getElementById(`screen-${id}`).classList.add('hidden');
            });
            
            // 선택한 화면 보이기
            document.getElementById(`screen-${tabId}`).classList.remove('hidden');
            
            // 네비게이션 아이콘 색상 변경
            document.querySelectorAll('.nav-item').forEach(btn => {
                if(btn.dataset.target === tabId) {
                    btn.classList.add('active');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('active');
                    btn.classList.add('text-gray-400');
                }
            });

            // 지도 탭으로 이동 시 지도 렌더링 최적화
            if (tabId === 'map') {
                if (!mapInitialized) {
                    initMap(); // 처음 진입 시 지도 로드
                } else if (map) {
                    setTimeout(() => map.invalidateSize(), 100); // 뷰 크기 변경에 따른 지도 깨짐 방지
                }
            }
        }

        // --- 음성 인식 및 AI 분석 시뮬레이션 ---
        let isRecording = false;
        let recognition;
        
        // 브라우저에서 음성 인식 API를 지원하는지 확인
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; // 한 번 말하면 종료
            recognition.interimResults = true; // 말하는 도중에도 텍스트 표시
            recognition.lang = 'ko-KR'; // 한국어 설정

            recognition.onstart = function() {
                isRecording = true;
                document.getElementById('mic-btn').classList.add('recording');
                document.getElementById('voice-status').innerText = "말씀을 듣고 있습니다...";
                document.getElementById('result-box').classList.add('hidden');
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                // 말이 끝났을 때
                if (finalTranscript !== '') {
                    document.getElementById('voice-status').innerText = `"${finalTranscript}"`;
                    simulateAIAnalysis(finalTranscript); // 가상 AI 분석 실행
                } else {
                    document.getElementById('voice-status').innerText = `"${interimTranscript}"`;
                }
            };

            recognition.onerror = function(event) {
                console.error('음성 인식 오류:', event.error);
                stopRecording();
                document.getElementById('voice-status').innerText = "오류가 발생했습니다. 버튼을 다시 눌러주세요.";
            };

            recognition.onend = function() {
                if (isRecording) stopRecording();
            };
        }

        function toggleRecording() {
            if (!recognition) {
                document.getElementById('voice-status').innerText = "이 브라우저에서는 음성 인식을 지원하지 않습니다.";
                return;
            }
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('mic-btn').classList.remove('recording');
        }

        // 실제 API 연동 대신 키워드를 분석하여 결과를 보여주는 가상 AI 함수
        function simulateAIAnalysis(text) {
            document.getElementById('voice-status').innerText = "AI 주치의가 증상을 분석 중입니다...";
            
            setTimeout(() => {
                const resultBox = document.getElementById('result-box');
                const resultText = document.getElementById('result-text');
                
                resultBox.classList.remove('hidden');
                document.getElementById('voice-status').innerText = "분석 완료";

                let response = "";
                // 간단한 키워드 매칭 로직
                if(text.includes('배') || text.includes('소화') || text.includes('토') || text.includes('속')) {
                    response = "어르신, 소화가 잘 안 되고 배가 아프시군요. 따뜻한 물을 천천히 드시고, 가까운 <b>내과</b>를 방문하셔서 진료를 받아보시는 것이 좋겠습니다.";
                    currentDept = '내과';
                } else if (text.includes('무릎') || text.includes('허리') || text.includes('뼈') || text.includes('관절') || text.includes('쑤셔')) {
                    response = "어르신, 관절이나 뼈가 편찮으시군요. 무리하게 걷지 마시고, <b>정형외과</b>에 가셔서 물리치료나 진찰을 받아보세요.";
                    currentDept = '정형외과';
                } else if (text.includes('눈') || text.includes('침침') || text.includes('보여')) {
                    response = "어르신, 눈이 침침하고 불편하시군요. 시력 저하나 안질환일 수 있으니 <b>안과</b>를 방문해보세요.";
                    currentDept = '안과';
                } else if (text.includes('이') || text.includes('치아') || text.includes('씹')) {
                    response = "어르신, 치아가 불편하셔서 식사하시기 힘드시겠어요. 방치하면 더 아파지니 빠른 시일 내에 <b>치과</b>를 방문해 보세요.";
                    currentDept = '치과';
                } else {
                    response = "말씀하신 증상을 잘 확인했습니다. 정확한 진단과 치료를 위해 가까운 <b>내과</b>나 동네 의원을 방문하시어 의사 선생님과 상담해보시는 것을 권장해 드립니다.";
                    currentDept = '내과';
                }
                
                resultText.innerHTML = response;
                
                // 분석된 진료과목으로 병원 지도 필터 자동 세팅
                filterDept(currentDept);

            }, 1500); // 1.5초 후 분석 결과 표시 (로딩 효과)
        }

        // --- 지도 및 병원 데이터 로직 ---
        function initMap() {
            mapInitialized = true;
            const statusText = document.getElementById('location-status');

            // 기본 위치 세팅 (사용자 정보에 맞춰 전라남도 목포시청 인근으로 설정)
            const defaultLat = 34.811835;
            const defaultLng = 126.392166;

            // 브라우저 위치 정보(GPS) 권한 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        statusText.innerHTML = `<span class="text-blue-600 font-bold"><i class="fa-solid fa-location-dot mr-1"></i>현재 위치 기준 병원</span>`;
                        setupMap(lat, lng);
                    },
                    (error) => {
                        // 권한이 차단되었거나 iframe 환경에서 실패할 경우 기본 위치(목포) 사용
                        console.warn("위치 정보 권한이 차단되었습니다. 기본 위치를 사용합니다.");
                        statusText.innerHTML = `<span class="text-gray-600"><i class="fa-solid fa-map-pin mr-1"></i>전라남도 목포시 주변 병원</span>`;
                        setupMap(defaultLat, defaultLng);
                    },
                    { enableHighAccuracy: false, timeout: 5000, maximumAge: 0 }
                );
            } else {
                setupMap(defaultLat, defaultLng);
            }
        }

        // 지도 생성 및 마커 렌더링
        function setupMap(lat, lng) {
            // 이미 맵 객체가 있다면 중복 렌더링 방지를 위해 삭제
            if (map !== null) {
                map.remove();
            }

            try {
                // 오픈소스 Leaflet 맵 초기화
                map = L.map('hospital-map').setView([lat, lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // 사용자 현재 위치 마커 (빨간색 동그라미)
                const userIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div style='background-color:#ef4444; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.5);'></div>",
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                });
                userMarker = L.marker([lat, lng], {icon: userIcon}).addTo(map).bindPopup('<b class="text-lg">내 위치</b>').openPopup();

                // 주변 가상의 병원 데이터 생성 및 화면에 표시
                generateMockHospitals(lat, lng);
                renderHospitals();
            } catch(e) {
                console.error("지도 초기화 중 에러 발생:", e);
                document.getElementById('hospital-list').innerHTML = '<p class="text-red-500 text-center py-4">지도를 불러오는 중 문제가 발생했습니다.</p>';
            }
        }

        // 현재 좌표 주변에 가상의 병원 20개 무작위 생성
        function generateMockHospitals(baseLat, baseLng) {
            const depts = ['내과', '내과', '정형외과', '정형외과', '안과', '치과', '이비인후과'];
            const prefixes = ['중앙', '목포제일', '튼튼', '푸른', '행복', '우리동네', '바른', '성모'];
            
            allHospitals = [];
            for(let i = 0; i < 20; i++) {
                const dept = depts[Math.floor(Math.random() * depts.length)];
                const name = prefixes[Math.floor(Math.random() * prefixes.length)] + ' ' + dept;
                
                // 현재 위치에서 반경 약 1~2km 내외 무작위 배치
                const latOffset = (Math.random() - 0.5) * 0.02;
                const lngOffset = (Math.random() - 0.5) * 0.02;
                const hLat = baseLat + latOffset;
                const hLng = baseLng + lngOffset;
                
                // 단순 직선 거리 계산 (단위: km 추정)
                const distance = Math.sqrt(Math.pow(latOffset * 111, 2) + Math.pow(lngOffset * 88, 2)).toFixed(1);

                allHospitals.push({ id: i, name: name, dept: dept, lat: hLat, lng: hLng, distance: parseFloat(distance) });
            }
            // 가장 가까운 병원부터 보이도록 거리순 정렬
            allHospitals.sort((a, b) => a.distance - b.distance);
        }

        // 진료 과목 버튼 클릭 시 필터링 처리
        function filterDept(dept) {
            currentDept = dept;
            
            // 버튼 디자인 업데이트 (선택된 버튼은 파란색으로)
            document.querySelectorAll('.dept-btn').forEach(btn => {
                if(btn.innerText === dept) {
                    btn.classList.replace('bg-white', 'bg-blue-600');
                    btn.classList.replace('text-gray-600', 'text-white');
                    btn.classList.replace('border-gray-300', 'border-blue-600');
                    btn.classList.add('active-dept');
                } else {
                    btn.classList.replace('bg-blue-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-gray-600');
                    btn.classList.replace('border-blue-600', 'border-gray-300');
                    btn.classList.remove('active-dept');
                }
            });
            
            if(mapInitialized) renderHospitals();
        }

        // 검색창 아이콘 클릭 시 처리
        function searchHospital() {
            currentSearch = document.getElementById('hospital-search').value.trim();
            renderHospitals();
        }

        // 검색창에서 엔터키 입력 시 처리
        document.getElementById('hospital-search').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchHospital();
        });

        // 병원 리스트 및 지도 위 마커 렌더링
        function renderHospitals() {
            const listContainer = document.getElementById('hospital-list');
            listContainer.innerHTML = '';
            
            // 기존에 지도에 찍힌 마커들 전부 지우기
            hospitalMarkers.forEach(marker => map.removeLayer(marker));
            hospitalMarkers = [];

            // 선택된 진료과목과 검색어에 맞는 병원만 추려내기
            const filtered = allHospitals.filter(h => {
                const matchDept = currentDept === '전체' || h.dept === currentDept;
                const matchSearch = currentSearch === '' || h.name.includes(currentSearch);
                return matchDept && matchSearch;
            });

            // 검색 결과가 없을 때
            if (filtered.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-500 py-8 text-lg font-medium bg-white rounded-xl shadow-sm border border-gray-100">조건에 맞는 병원이 주변에 없습니다.</p>';
                return;
            }

            // 진료 과목별 컬러 매칭 (테두리 색상용)
            const deptColors = {
                '내과': 'border-blue-500',
                '정형외과': 'border-orange-500',
                '안과': 'border-green-500',
                '치과': 'border-teal-500',
                '이비인후과': 'border-purple-500'
            };

            const mapBounds = [];

            // 필터링된 병원 리스트 생성
            filtered.forEach(h => {
                const colorClass = deptColors[h.dept] || 'border-gray-500';
                
                // 1. 하단 리스트에 항목 추가
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-xl shadow-sm border-l-4 ${colorClass} flex justify-between items-center mb-3 active:bg-gray-50 cursor-pointer transition-colors`;
                
                // 리스트 클릭 시 지도 중심 이동 및 팝업 열기
                div.onclick = () => {
                    map.setView([h.lat, h.lng], 16);
                    h.marker.openPopup();
                    window.scrollTo({ top: 0, behavior: 'smooth' }); // 화면 상단 지도로 스크롤
                };

                div.innerHTML = `
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">${h.name}</h3>
                        <p class="text-gray-500 mt-1 text-base font-medium">
                            <i class="fa-solid fa-location-dot mr-1"></i>${h.distance < 1 ? (h.distance * 1000).toFixed(0) + 'm' : h.distance + 'km'}
                        </p>
                    </div>
                    <button class="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center active:bg-blue-100 shadow-sm" onclick="event.stopPropagation();">
                        <i class="fa-solid fa-phone text-xl"></i>
                    </button>
                `;
                listContainer.appendChild(div);

                // 2. 지도에 파란색 마커 핀 꽂기
                const marker = L.marker([h.lat, h.lng]).addTo(map);
                marker.bindPopup(`<b class="text-lg">${h.name}</b><br><span class="text-gray-600">${h.dept}</span>`);
                h.marker = marker; // 클릭 이벤트를 위해 객체에 저장
                hospitalMarkers.push(marker); // 삭제를 위해 배열에 저장
                mapBounds.push([h.lat, h.lng]); // 줌 레벨 조정을 위해 좌표 저장
            });

            // 화면에 마커가 모두 보이도록 지도 배율 및 위치 자동 조절
            if (mapBounds.length > 0 && userMarker) {
                mapBounds.push(userMarker.getLatLng()); // 내 위치 좌표도 포함
                map.fitBounds(mapBounds, { padding: [30, 30], maxZoom: 15 });
            }
        }

        // 앱이 처음 켜지면 홈 탭을 기본으로 보여줌
        window.onload = () => switchTab('home');

    </script>
</body>
</html>
